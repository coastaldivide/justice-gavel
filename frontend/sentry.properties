# Sentry source map upload configuration
# Used by EAS build to upload source maps for readable production stack traces
# Get your auth token from: https://sentry.io/settings/account/api/auth-tokens/

defaults.org=justice-gavel
defaults.project=justice-gavel-mobile
auth.token=REPLACE_WITH_SENTRY_AUTH_TOKEN

# The auth token needs these scopes: project:releases, org:read
# Do NOT commit the real auth.token to git — add sentry.properties to .gitignore
# if it ever contains a real token (CI should inject it via EAS Secrets instead)
