<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <meta name="theme-color" content="#042C53" />
  <meta name="description" content="Free legal help if you get arrested. Find attorneys, bail bondsmen, and know your rights." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Justice Gavel" />
  <meta property="og:description" content="If you or someone you know gets arrested, Justice Gavel connects you with attorneys and bail bondsmen immediately — free." />
  <meta property="og:image" content="/assets/icon.png" />

  <!-- PWA -->
  <link rel="manifest" href="/web/manifest.json" />
  <link rel="icon" type="image/png" href="/assets/icon.png" />
  <link rel="apple-touch-icon" href="/assets/icon.png" />

  <title>Justice Gavel — Free Legal Help</title>

  <style>
    /* Prevent flash of unstyled content */
    html, body, #root { height: 100%; margin: 0; padding: 0; background: #042C53; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    /* Loading placeholder */
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; background: #042C53; flex-direction: column; gap: 16px;
    }
    #loading p { color: #C9A84C; font-size: 14px; letter-spacing: 0.05em; margin: 0; }
    .gavel { font-size: 48px; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  </style>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Justice Gavel" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <style>
    /* Desktop: center at 500px like a phone, brand bg for sidebars */
    body { background: linear-gradient(135deg, #042C53, #0a4a7a, #063852); margin: 0; }
    #root { max-width: 500px; margin: 0 auto; min-height: 100vh; background: #fff;
            box-shadow: 0 0 60px rgba(0,0,0,0.3); position: relative; }
    button, [role="button"], a { transition: opacity 0.15s ease; cursor: pointer; }
    button:hover, [role="button"]:hover { opacity: 0.85; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(4,44,83,0.3); border-radius: 2px; }
    ::selection { background: #042C53; color: #fff; }
    @media (max-width: 520px) { #root { max-width: 100%; box-shadow: none; }
      body { background: #fff; } }
  </style>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; connect-src 'self' https: wss:; font-src 'self' data:; frame-src 'none'; object-src 'none';" />
</head>
<body>
  <div id="loading">
    <div class="gavel">⚖️</div>
    <p>JUSTICE GAVEL</p>
  </div>
  <div id="root"></div>
  <script>
    // Remove loading placeholder once app mounts
    document.addEventListener('DOMContentLoaded', () => {
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const loading = document.getElementById('loading');
          if (loading) loading.remove();
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').catch(function(){});
      });
    }
  </script>
</body>
</html>
